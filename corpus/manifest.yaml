# values shown here are derived from each PDF's first-page header banner — verify
# during first ingest with the regex `^(\d{8}-\d{4})\s+FERC\s+PDF`.
#
# All pdf_urls are HEAD-verified 2026-05-06 unless marked TODO.
# See feasibility-notes.md §A3 for verification methodology.

