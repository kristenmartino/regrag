[project]
name = "regrag-eval"
version = "0.1.0"
description = "Eval harness for RegRAG: retrieval recall, citation faithfulness, refusal accuracy"
requires-python = ">=3.9"
dependencies = [
    "pyyaml>=6.0",
    "click>=8.1",
    "python-dotenv>=1.0",
    "anthropic>=0.40",
    # depends on the api package to invoke the chat graph
    "regrag-api",
]

[project.scripts]
regrag-eval = "regrag_eval.cli:cli"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
regrag_eval = ["*.yaml"]

[tool.uv.sources]
regrag-api = { path = "../../apps/api", editable = true }
