  # ═══════════════════════════════════════════════════════════════════════════════
  # Issue #3 expansion (2026-05-29): harder OOS questions. Unlike the topic_absent
  # set above (which names topics with no corpus presence), these name IN-CORPUS
  # orders so naive retrieval returns high-cosine chunks — only a real answerability
  # check should refuse. Three categories: false_premise, order_conflation,
  # jurisdiction_boundary. All expected_behavior: refuse.
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─────────── Compliance analyst ───────────
  - id: compliance-oos-003
    persona: compliance_analyst
    expected_behavior: refuse
    query: "What monetary penalty does Order 841 impose on an RTO that misses the storage participation compliance deadline?"
    expected_refusal_reason: "Order 841 sets a compliance deadline but establishes no monetary penalty for missing it; the premise is false."
    category: false_premise

  - id: compliance-oos-004
    persona: compliance_analyst
    expected_behavior: refuse
    query: "What does Order 745 require regarding electric storage resource participation models?"
    expected_refusal_reason: "Order 745 (2011) is demand-response compensation; storage participation models are Order 841 (2018). Conflation."
    category: order_conflation

  - id: compliance-oos-005
    persona: compliance_analyst
    expected_behavior: refuse
    query: "Under Order 841, what retail rate may a utility charge a customer for behind-the-meter storage?"
    expected_refusal_reason: "Retail rates are state jurisdiction; Order 841 governs wholesale market participation, not retail rates."
    category: jurisdiction_boundary

  - id: compliance-oos-006
    persona: compliance_analyst
    expected_behavior: refuse
    query: "Under Order 2222, how much must distribution utilities pay DER aggregators per megawatt-hour?"
    expected_refusal_reason: "Order 2222 routes aggregator compensation through RTO/ISO markets; it sets no per-MWh payment from distribution utilities. False premise."
    category: false_premise

  # ─────────── Counsel ───────────
  - id: counsel-oos-003
    persona: counsel
    expected_behavior: refuse
    query: "How many megawatts of electric storage does Order 841 require each RTO to procure?"
    expected_refusal_reason: "Order 841 removes participation barriers; it imposes no storage procurement quantity mandate. False premise."
    category: false_premise

  - id: counsel-oos-004
    persona: counsel
    expected_behavior: refuse
    query: "What are Order 841's generator interconnection queue reforms?"
    expected_refusal_reason: "Order 841 is electric-storage market participation; interconnection queue reform is Orders 845/2023. Conflation."
    category: order_conflation

  - id: counsel-oos-005
    persona: counsel
    expected_behavior: refuse
    query: "Does Order 2222 give FERC authority to set retail net-metering rates for residential customers?"
    expected_refusal_reason: "Retail net-metering is state jurisdiction; Order 2222 addresses wholesale market participation. Jurisdiction boundary."
    category: jurisdiction_boundary

  - id: counsel-oos-006
    persona: counsel
    expected_behavior: refuse
    query: "Under Order 1920, what federal tax credit is available to transmission developers?"
    expected_refusal_reason: "Order 1920 is transmission planning and cost allocation; it establishes no tax credit (those are IRA/IRS). False premise."
    category: false_premise

  # ─────────── Federal staff ───────────
  - id: fedstaff-oos-003
    persona: federal_staff
    expected_behavior: refuse
    query: "What capacity payment rate does Order 745 set for demand response resources?"
    expected_refusal_reason: "Order 745 compensates demand response at LMP in the energy market; it sets no capacity payment rate. False premise."
    category: false_premise

  - id: fedstaff-oos-004
    persona: federal_staff
    expected_behavior: refuse
    query: "What five-minute settlement interval requirements does Order 845 establish?"
    expected_refusal_reason: "Order 845 is generator interconnection reform; five-minute settlement is Order 825. Conflation."
    category: order_conflation

  - id: fedstaff-oos-005
    persona: federal_staff
    expected_behavior: refuse
    query: "What FERC commissioner confirmation process do these orders describe?"
    expected_refusal_reason: "Commissioner confirmation is a Senate process, not a subject of these regulatory orders. Topic outside scope."
    category: jurisdiction_boundary

  # ─────────── Policy researcher ───────────
  - id: researcher-oos-003
    persona: researcher
    expected_behavior: refuse
    query: "What carbon-emissions reduction targets does Order 2222 establish for DER aggregations?"
    expected_refusal_reason: "Order 2222 enables DER market participation; it sets no emissions-reduction targets. False premise."
    category: false_premise

  - id: researcher-oos-004
    persona: researcher
    expected_behavior: refuse
    query: "How does Order 1000 regulate distributed energy resource aggregation in wholesale markets?"
    expected_refusal_reason: "Order 1000 (2011) is regional transmission planning; DER aggregation is Order 2222 (2020). Conflation."
    category: order_conflation

  - id: researcher-oos-005
    persona: researcher
    expected_behavior: refuse
    query: "What greenhouse-gas emissions reporting do these FERC orders require of generators?"
    expected_refusal_reason: "GHG emissions reporting is EPA's domain; these orders (storage, DER, interconnection, planning, settlement) impose no such reporting. Topic outside scope."
    category: jurisdiction_boundary

  - id: researcher-oos-006
    persona: researcher
    expected_behavior: refuse
    query: "What demand response compensation formula does Order 2023 adopt?"
    expected_refusal_reason: "Order 2023 is generator interconnection; demand-response compensation is Order 745. Conflation."
    category: order_conflation
