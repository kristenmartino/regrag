# RegRAG eval set — hand-crafted questions for measuring retrieval recall,
# citation faithfulness, and refusal accuracy.
#
# Schema per question:
#   id: short slug
#   persona: which user type from case study §2 the question models
#   expected_behavior: 'answer' | 'refuse' | 'clarify'
#   query: what the user asks
#   For answer-expected:
#     expected_documents: list of accession_numbers that should appear in retrieved chunks
#     expected_passages_keywords: 2-5 lowercased phrases that should appear in retrieved chunks
#                                 (used for retrieval-recall scoring)
#   For refuse-expected:
#     expected_refusal_reason: free-text gloss of why this is OOS (not used in scoring,
#                              just for human review of false-positive answers)
#     category: (OOS only) 'topic_absent' | 'false_premise' | 'order_conflation' |
#               'jurisdiction_boundary' — tags the *kind* of unanswerability, so
#               refusal recall can be broken down by category (added for issue #3).
#
# History:
#   - Original: 5 in-scope + 2 OOS per persona × 4 = 28 questions (8-doc corpus).
#   - Tier-2 (2026-05-08): +12 in-scope for the 15-doc corpus expansion → 40.
#   - Issue #3 (2026-05-29): +15 OOS questions in the harder categories
#     (false_premise, order_conflation, jurisdiction_boundary) that name in-corpus
#     orders, so naive retrieval returns high-cosine chunks and only a real
#     answerability check refuses → 55 total, 23 of them OOS.

questions:
  # ─────────── Compliance analyst (operational, mostly single-doc) ───────────
  - id: compliance-001
    persona: compliance_analyst
    expected_behavior: answer
    query: "What reporting and data requirements does Order 2222 establish for distributed energy resource aggregators?"
    expected_documents: ["20200917-3084"]
    expected_passages_keywords: ["settlement data", "performance data", "auditing"]

  - id: compliance-002
    persona: compliance_analyst
    expected_behavior: answer
    query: "What is the deadline for RTO/ISO compliance filings under Order 841?"
    expected_documents: ["20180228-3066"]
    expected_passages_keywords: ["compliance filing", "tariff", "270 days"]

  - id: compliance-003
    persona: compliance_analyst
    expected_behavior: answer
    query: "Under Order 2222, how must RTOs/ISOs treat aggregations that include customers of small utilities?"
    expected_documents: ["20200917-3084", "20210318-3057"]
    expected_passages_keywords: ["small utility", "opt-in", "4 million MWh"]

  - id: compliance-004
    persona: compliance_analyst
    expected_behavior: answer
    query: "What information must distribution utilities share with DER aggregators under Order 2222-A?"
    expected_documents: ["20210318-3057"]
    expected_passages_keywords: ["distribution utility", "review process", "aggregator"]

  - id: compliance-005
    persona: compliance_analyst
    expected_behavior: answer
    query: "What metering and telemetry requirements does Order 841 impose on electric storage resources?"
    expected_documents: ["20180228-3066"]
    expected_passages_keywords: ["metering", "telemetry", "storage"]

  - id: compliance-oos-001
    persona: compliance_analyst
    expected_behavior: refuse
    query: "What are FERC's residential rooftop solar net-metering requirements?"
    expected_refusal_reason: "Net-metering is state jurisdiction; corpus does not address it."
    category: topic_absent

  - id: compliance-oos-002
    persona: compliance_analyst
    expected_behavior: refuse
    query: "What cybersecurity standards must investor-owned utilities follow under FERC?"
    expected_refusal_reason: "Cybersecurity standards (NERC CIP) are out of corpus scope."
    category: topic_absent

  # ─────────── Counsel at energy developer (interpretive, multi-doc) ───────────
  - id: counsel-001
    persona: counsel
    expected_behavior: answer
    query: "How has FERC's treatment of state opt-out provisions evolved from Order 745 through Order 2222 and Order 2222-A?"
